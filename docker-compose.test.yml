version: '3.8'
services:
  funkomania-db-test:
    image: mysql:8.0.46
    container_name: funkomania-mysql-test
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: funkomania_db
    volumes:
      - funkomania-db-test-volume:/var/lib/mysql
      - "./src/main/resources/init.sql:/docker-entrypoint-initdb.d/init.sql"
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p123456" ]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  funkomania-db-test-volume:

